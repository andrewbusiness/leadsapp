<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Leads</title>

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      padding: 16px;
      margin: 0;
      background: #f7f7f7;
    }

    .container {
      max-width: 500px;
      margin: auto;
    }

    input, textarea {
      width: 100%;
      font-size: 16px;
      padding: 14px;
      margin-bottom: 10px;
      border-radius: 10px;
      border: 1px solid #ccc;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      font-size: 18px;
      padding: 16px;
      border: none;
      border-radius: 12px;
      background: black;
      color: white;
    }

    select {
  width: 100%;
  font-size: 16px;
  padding: 14px;
  margin-bottom: 10px;
  border-radius: 10px;
  border: 1px solid #ccc;
  box-sizing: border-box;
  background: white;
}

    .status {
      text-align: center;
      margin-top: 8px;
      font-size: 14px;
      color: green;
      height: 20px;
    }
  </style>
</head>

<body>
<div class="container">

  <select id="salesperson">
    <option value="">Who got the sale?</option>
    <option value="Andrew">Andrew</option>
    <option value="Ishaan">Ishaan</option>
    <option value="Elliott">Elliott</option>
  </select>

  <input id="name" placeholder="Name of Client (optional)">
  <input id="address" placeholder="Address">
  <input id="phone" placeholder="Phone Number">
  <input id="day" type="date">
  <input id="time" type="time">
  <textarea id="notes" placeholder="Other Notes"></textarea>

  <button onclick="saveLead()">Save</button>
  <div class="status" id="status"></div>

</div>

<script>
  const url = "https://script.google.com/macros/s/AKfycbzgoUEQrQWnP0itfWV7D3fI_ovUoT-_jpHT_Q463aAC6v2zDUZAjhqZY32ankJIOS6A9Q/exec";

  const status = document.getElementById("status");

  function saveLead() {
    const data = {
  salesperson: document.getElementById("salesperson").value,
  name: document.getElementById("name").value,
  address: document.getElementById("address").value,
  phone: document.getElementById("phone").value,
  day: document.getElementById("day").value,
  time: document.getElementById("time").value,
  notes: document.getElementById("notes").value
};
    const form = document.createElement("form");
    form.method = "POST";
    form.action = url;

    for (let key in data) {
      const input = document.createElement("input");
      input.type = "hidden";
      input.name = key;
      input.value = data[key] || "";
      form.appendChild(input);
    }

    document.body.appendChild(form);
    form.submit();
  }
</script>

</body>
</html>
